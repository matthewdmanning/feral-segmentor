stages:
  fetch:
    cmd: uv run python -m feral_segmentor.data.fetch
    outs:
      - data/raw

  augment:
    cmd: uv run python -m feral_segmentor.data.augmentations
    deps:
      - data/raw
    outs:
      - data/augmented

  preprocess:
    cmd: uv run python -m feral_segmentor.data.transforms
    deps:
      - data/raw
    outs:
      - data/processed

  acquire_model:
    cmd: uv run python -m feral_segmentor.models.acquire
    deps:
      - conf
    outs:
      - models/checkpoints

  train:
    cmd: uv run python -m feral_segmentor.training.trainer
    deps:
      - data/processed
      - models/checkpoints
      - conf
    outs:
      - models/registry/best.pt

  evaluate:
    cmd: uv run python -m feral_segmentor.training.metrics
    deps:
      - models/registry/best.pt
    metrics:
      - metrics.json

  export:
    cmd: uv run python -m feral_segmentor.inference.predictor
    deps:
      - models/registry/best.pt
    outs:
      - models/registry/onnx
