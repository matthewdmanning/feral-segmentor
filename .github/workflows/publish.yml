name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run python -m pytest -m "not gpu and not slow" -q
      - run: uv run mypy src
      - run: uv build

      # Uncomment to publish to PyPI on tag push:
      # - name: Publish to PyPI
      #   env:
      #     UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      #   run: uv publish
